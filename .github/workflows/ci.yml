name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          bad=$(gofmt -l .)
          if [ -n "$bad" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$bad"
            exit 1
          fi

      - name: go test
        run: go test ./...

  build:
    name: build binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
